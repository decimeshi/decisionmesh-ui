<svg xmlns="http://www.w3.org/2000/svg" width="280" height="90" viewBox="0 0 280 90">
  <rect width="280" height="90" rx="12" fill="#111827"/>
  
  <!-- Icon background -->
  <rect x="14" y="20" width="50" height="50" rx="12" fill="#1e2d3d"/>
  
  <!-- Diamond outline -->
  <polygon points="39,28 53,48 39,68 25,48" fill="none" stroke="#38bdf8" stroke-width="1.5"/>
  
  <!-- Grid lines inside diamond -->
  <line x1="25" y1="48" x2="53" y2="48" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  <line x1="39" y1="28" x2="39" y2="68" stroke="#38bdf8" stroke-width="1" opacity="0.4"/>
  
  <!-- Inner mesh nodes -->
  <circle cx="39" cy="38" r="2.5" fill="#38bdf8"/>
  <circle cx="39" cy="48" r="3.5" fill="#38bdf8"/>
  <circle cx="39" cy="58" r="2.5" fill="#38bdf8"/>
  <circle cx="31" cy="48" r="2" fill="#38bdf8" opacity="0.6"/>
  <circle cx="47" cy="48" r="2" fill="#38bdf8" opacity="0.6"/>
  
  <!-- Corner accent nodes -->
  <circle cx="39" cy="28" r="2" fill="#7dd3fc"/>
  <circle cx="53" cy="48" r="2" fill="#7dd3fc"/>
  <circle cx="39" cy="68" r="2" fill="#7dd3fc"/>
  <circle cx="25" cy="48" r="2" fill="#7dd3fc"/>
  
  <!-- Wordmark -->
  <text x="76" y="42"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-weight="600" font-size="20" fill="white">Decision</text>
  <text x="76" y="63"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-weight="600" font-size="20" fill="#38bdf8">Mesh</text>
  <text x="78" y="78"
        font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif"
        font-weight="400" font-size="8.5" fill="#64748b" letter-spacing="3">AI CONTROL PLANE</text>
</svg>
